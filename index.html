<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hotel Qadesh — 組織相関図</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300&family=Noto+Serif+JP:wght@300;400&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0a0e;
  --bg2: #0f0f16;
  --bg3: #14141e;
  --gold: #c9a84c;
  --gold2: #e8c96a;
  --gold-dim: rgba(201,168,76,0.15);
  --red: #c0392b;
  --red-dim: rgba(192,57,43,0.18);
  --purple: #7c6fd4;
  --purple-dim: rgba(124,111,212,0.15);
  --green: #2d8a5e;
  --green-dim: rgba(45,138,94,0.15);
  --gray: #4a4a5a;
  --gray-dim: rgba(74,74,90,0.15);
  --text: #d4cfc4;
  --text-dim: #6e6a62;
  --border: rgba(201,168,76,0.12);
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Noto Serif JP', serif;
  min-height: 100vh;
  overflow-x: hidden;
}

/* 背景テクスチャ */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background:
    radial-gradient(ellipse 80% 50% at 50% -10%, rgba(201,168,76,0.05) 0%, transparent 60%),
    radial-gradient(ellipse 40% 30% at 80% 80%, rgba(124,111,212,0.04) 0%, transparent 50%);
  pointer-events: none;
  z-index: 0;
}

/* ノイズテクスチャ */
body::after {
  content: '';
  position: fixed;
  inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
  pointer-events: none;
  z-index: 0;
  opacity: 0.4;
}

.container {
  position: relative;
  z-index: 1;
  max-width: 1200px;
  margin: 0 auto;
  padding: 3rem 2rem 4rem;
}

/* ヘッダー */
header {
  text-align: center;
  margin-bottom: 3rem;
  padding-bottom: 2rem;
  border-bottom: 1px solid var(--border);
  position: relative;
}

header::after {
  content: '';
  position: absolute;
  bottom: -1px;
  left: 50%;
  transform: translateX(-50%);
  width: 60px;
  height: 1px;
  background: var(--gold);
}

.hotel-name {
  font-family: 'Cormorant Garamond', serif;
  font-size: clamp(2rem, 5vw, 3.5rem);
  font-weight: 300;
  letter-spacing: 0.25em;
  color: var(--gold);
  text-transform: uppercase;
  line-height: 1.1;
}

.hotel-name span {
  display: block;
  font-size: 0.35em;
  font-style: italic;
  letter-spacing: 0.4em;
  color: var(--gold2);
  opacity: 0.7;
  margin-top: 0.3em;
}

.subtitle {
  margin-top: 1rem;
  font-family: 'Share Tech Mono', monospace;
  font-size: 0.75rem;
  letter-spacing: 0.2em;
  color: var(--text-dim);
  text-transform: uppercase;
}

/* フィルターバー */
.filter-bar {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  align-items: center;
  margin-bottom: 2rem;
  padding: 1rem 1.25rem;
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 2px;
}

.filter-label {
  font-family: 'Share Tech Mono', monospace;
  font-size: 0.7rem;
  letter-spacing: 0.15em;
  color: var(--text-dim);
  margin-right: 4px;
  text-transform: uppercase;
}

.filter-btn {
  font-family: 'Share Tech Mono', monospace;
  font-size: 0.72rem;
  letter-spacing: 0.12em;
  padding: 4px 12px;
  border: 1px solid rgba(201,168,76,0.2);
  background: transparent;
  color: var(--text-dim);
  cursor: pointer;
  transition: all 0.2s ease;
  text-transform: uppercase;
  border-radius: 1px;
}

.filter-btn:hover { color: var(--gold); border-color: rgba(201,168,76,0.5); }

.filter-btn.active {
  color: var(--gold);
  border-color: var(--gold);
  background: var(--gold-dim);
}

.filter-btn.f-友好.active  { color: #a08fdd; border-color: #7c6fd4; background: var(--purple-dim); }
.filter-btn.f-業務提携.active { color: #5aaa84; border-color: #2d8a5e; background: var(--green-dim); }
.filter-btn.f-監視.active { color: #888; border-color: #555; background: var(--gray-dim); }
.filter-btn.f-敵対.active  { color: #e05050; border-color: var(--red); background: var(--red-dim); }
.filter-btn.f-その他.active { color: #7a8a9a; border-color: #4a5a6a; background: rgba(74,90,106,0.15); }

.legend-spacer { flex: 1; }

.legend {
  display: flex;
  gap: 14px;
  flex-wrap: wrap;
  align-items: center;
}

.legend-item {
  display: flex;
  align-items: center;
  gap: 6px;
  font-family: 'Share Tech Mono', monospace;
  font-size: 0.68rem;
  color: var(--text-dim);
  letter-spacing: 0.08em;
}

.legend-line {
  width: 22px;
  height: 2px;
  border-radius: 1px;
}

/* SVGエリア */
.diagram-wrap {
  position: relative;
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 2px;
  overflow: visible;
}

svg#diagram {
  display: block;
  width: 100%;
  height: auto;
}

/* ツールチップ */
.tooltip {
  position: fixed;
  background: var(--bg3);
  border: 1px solid rgba(201,168,76,0.3);
  padding: 10px 14px;
  font-size: 0.78rem;
  line-height: 1.6;
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.15s;
  max-width: 260px;
  z-index: 100;
  color: var(--text);
  font-family: 'Noto Serif JP', serif;
  box-shadow: 0 8px 32px rgba(0,0,0,0.5);
}

.tooltip.show { opacity: 1; }

.tooltip-name {
  font-family: 'Cormorant Garamond', serif;
  font-size: 1rem;
  color: var(--gold);
  font-weight: 400;
  display: block;
  margin-bottom: 4px;
  letter-spacing: 0.04em;
}

.tooltip-type {
  font-family: 'Share Tech Mono', monospace;
  font-size: 0.65rem;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  margin-bottom: 6px;
  display: block;
}

.tooltip-desc {
  font-size: 0.76rem;
  color: var(--text-dim);
  line-height: 1.7;
}

.tooltip-link {
  display: block;
  margin-top: 6px;
  font-family: 'Share Tech Mono', monospace;
  font-size: 0.62rem;
  color: var(--gold);
  letter-spacing: 0.1em;
  opacity: 0.6;
}

/* フッター */
footer {
  text-align: center;
  margin-top: 2.5rem;
  padding-top: 1.5rem;
  border-top: 1px solid var(--border);
  font-family: 'Share Tech Mono', monospace;
  font-size: 0.65rem;
  letter-spacing: 0.15em;
  color: var(--text-dim);
  text-transform: uppercase;
}

/* アニメーション */
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(12px); }
  to   { opacity: 1; transform: translateY(0); }
}

.container { animation: fadeIn 0.8s ease both; }
header     { animation: fadeIn 0.8s 0.1s ease both; }
.filter-bar{ animation: fadeIn 0.8s 0.2s ease both; }
.diagram-wrap { animation: fadeIn 0.8s 0.3s ease both; }

/* ノードホバー */
.node { cursor: pointer; transition: opacity 0.2s; }
.node rect, .node ellipse { transition: filter 0.2s; }
.node:hover rect, .node:hover ellipse { filter: brightness(1.15) drop-shadow(0 0 6px rgba(201,168,76,0.3)); }

.node-no-link { cursor: default; }
.node-no-link:hover rect { filter: brightness(1.08); }

/* エッジホバー */
.edge { cursor: default; transition: opacity 0.3s; }
.edge:hover { cursor: crosshair; }
</style>
</head>
<body>

<div class="container">
  <header>
    <div class="hotel-name">
      Hotel Qadesh
      <span>ホテルカデシュ — 組織相関図</span>
    </div>
    <div class="subtitle">Character Correlation Diagram &nbsp;/&nbsp; ver 1.0</div>
  </header>

  <div class="filter-bar">
    <span class="filter-label">Filter :</span>
    <button class="filter-btn active" data-filter="all">All</button>
    <button class="filter-btn f-友好" data-filter="友好">友好</button>
    <button class="filter-btn f-業務提携" data-filter="業務提携">業務提携</button>
    <button class="filter-btn f-監視" data-filter="監視・潜伏">監視・潜伏</button>
    <button class="filter-btn f-敵対" data-filter="敵対">敵対</button>
    <button class="filter-btn f-その他" data-filter="その他">その他</button>

    <div class="legend">
      <div class="legend-item"><div class="legend-line" style="background:#7c6fd4"></div>友好</div>
      <div class="legend-item"><div class="legend-line" style="background:#2d8a5e"></div>業務提携</div>
      <div class="legend-item"><div class="legend-line" style="background:#c0392b; border-top: 2px dashed #c0392b; height:0; background:none;"></div>敵対</div>
      <div class="legend-item"><div class="legend-line" style="background:none; border-top:2px dashed #4a4a5a; height:0;"></div>監視・潜伏</div>
      <div class="legend-item"><div class="legend-line" style="background:#3a4a5a"></div>その他</div>
    </div>
  </div>

  <div class="diagram-wrap">
    <svg id="diagram" viewBox="0 0 940 700" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <!-- 矢印マーカー -->
        <marker id="arr-友好" markerWidth="9" markerHeight="9" refX="7" refY="3.5" orient="auto">
          <path d="M0,0 L0,7 L9,3.5 z" fill="#7c6fd4"/>
        </marker>
        <marker id="arr-業務提携" markerWidth="9" markerHeight="9" refX="7" refY="3.5" orient="auto">
          <path d="M0,0 L0,7 L9,3.5 z" fill="#2d8a5e"/>
        </marker>
        <marker id="arr-敵対" markerWidth="9" markerHeight="9" refX="7" refY="3.5" orient="auto">
          <path d="M0,0 L0,7 L9,3.5 z" fill="#c0392b"/>
        </marker>
        <marker id="arr-監視" markerWidth="9" markerHeight="9" refX="7" refY="3.5" orient="auto">
          <path d="M0,0 L0,7 L9,3.5 z" fill="#4a4a5a"/>
        </marker>
        <marker id="arr-その他" markerWidth="9" markerHeight="9" refX="7" refY="3.5" orient="auto">
          <path d="M0,0 L0,7 L9,3.5 z" fill="#3a4a5a"/>
        </marker>
        <!-- グロー -->
        <filter id="glow-gold">
          <feGaussianBlur stdDeviation="3" result="blur"/>
          <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
      </defs>

      <!-- ======= エッジ ======= -->
      <!-- 敵対：カデシュ → フランス -->
      <line class="edge 敵対"
        x1="418" y1="268" x2="198" y2="95"

        data-desc="カデシュ関係者・親睦の深い方のみを対象とした個人運営の工房"/>

      <!-- 監視・潜伏 -->

        data-desc="サンデーがストリクスのコードを持ちカデシュ周辺を素性を隠して単独観察"/>

        x1="838" y1="258" x2="678" y2="172"

        marker-end="url(#arr-監視)"
        data-type="監視・潜伏" data-label="FBI → ホテルカデシュ・フランス"
        data-desc="アレックス・ヘイデンがカデシュフランスに潜り込みFBIとの二重スパイとして活動"/>
      <line class="edge 監視・潜伏"
        x1="778" y1="438" x2="478" y2="315"
        stroke="#4a4a5a" stroke-width="1.4" stroke-dasharray="5,4"
        marker-end="url(#arr-監視)"
        data-type="監視・潜伏" data-label="ISMO → ホテルカデシュ"
        data-desc="ハスミ・ツバキヤがISMO実働係としてカデシュに関与"/>

      <!-- その他 -->
      <line class="edge その他"
        x1="426" y1="312" x2="153" y2="530"
        stroke="#3a4a5a" stroke-width="1.4"
        marker-end="url(#arr-その他)"

        data-desc="社会の外れ者を訓練する裏社会専門の人材紹介所。依頼関係にある"/>
      <line class="edge その他"
        x1="443" y1="312" x2="728" y2="540"
        stroke="#3a4a5a" stroke-width="1.4"
        marker-end="url(#arr-その他)"
        data-type="その他" data-label="ホテルカデシュ → 零影"

      <!-- La Famiglia D'Oro（右上・友好） -->

      <!-- ======= 中心：ホテルカデシュ ======= -->
      <g class="node"
        data-id="qadesh" data-type="中心"
        data-name="ホテルカデシュ"

<script>
const tooltip = document.getElementById('tooltip');
const ttName  = document.getElementById('tt-name');
const ttType  = document.getElementById('tt-type');
const ttDesc  = document.getElementById('tt-desc');
const ttLink  = document.getElementById('tt-link');

let activeFilter = 'all';

/* フィルター */
document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    activeFilter = btn.dataset.filter;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    document.querySelectorAll('.edge').forEach(edge => {
      const types = edge.className.baseVal.split(' ').filter(c => c !== 'edge');
      const match = activeFilter === 'all' || types.includes(activeFilter);
      edge.style.opacity = match ? '1' : '0.04';
    });
  });
});

/* ノードのツールチップ＆クリック */
document.querySelectorAll('.node, .node-no-link').forEach(node => {
  node.addEventListener('mouseenter', () => {
    ttName.textContent  = node.dataset.name  || '';
    ttType.textContent  = node.dataset.type  || '';
    ttDesc.textContent  = node.dataset.desc  || '';
    ttLink.textContent  = node.dataset.url ? '→ Notionで開く' : '';
    ttLink.style.display = node.dataset.url ? 'block' : 'none';
    tooltip.classList.add('show');
  });
  node.addEventListener('mouseleave', () => tooltip.classList.remove('show'));
  node.addEventListener('mousemove', e => {
    let x = e.clientX + 18, y = e.clientY + 12;
    if (x + 270 > window.innerWidth)  x = e.clientX - 280;
    if (y + 140 > window.innerHeight) y = e.clientY - 130;
    tooltip.style.left = x + 'px';
    tooltip.style.top  = y + 'px';
  });
  node.addEventListener('click', () => {
    const url = node.dataset.url;
    if (url) window.open(url, '_blank');
  });
});

/* エッジのツールチップ */
document.querySelectorAll('.edge').forEach(edge => {
  edge.addEventListener('mouseenter', () => {
    ttName.textContent  = edge.dataset.label || '';
    ttType.textContent  = edge.dataset.type  || '';
    ttDesc.textContent  = edge.dataset.desc  || '';
    ttLink.style.display = 'none';
    tooltip.classList.add('show');
  });
  edge.addEventListener('mouseleave', () => tooltip.classList.remove('show'));
  edge.addEventListener('mousemove', e => {
    let x = e.clientX + 18, y = e.clientY + 12;
    if (x + 270 > window.innerWidth)  x = e.clientX - 280;
    if (y + 140 > window.innerHeight) y = e.clientY - 130;
    tooltip.style.left = x + 'px';
    tooltip.style.top  = y + 'px';
  });
});
</script>
