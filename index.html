<style>
:root{

  --gold:#c9a84c;--gold2:#e8c96a;--gold-dim:rgba(201,168,76,0.12);
  --text:#d0cbc0;--text-dim:#706860;--border:rgba(201,168,76,0.09);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Noto Serif JP',serif;overflow-x:hidden;}
.container{position:relative;z-index:1;max-width:1900px;margin:0 auto;padding:2rem 1.5rem 3rem;}
header{text-align:center;margin-bottom:1.6rem;padding-bottom:1.3rem;border-bottom:1px solid var(--border);position:relative;}
header::after{content:'';position:absolute;bottom:-1px;left:50%;transform:translateX(-50%);width:44px;height:1px;background:var(--gold);}
.hotel-name{font-family:'Cormorant Garamond',serif;font-size:clamp(2.2rem,4vw,3.4rem);font-weight:300;letter-spacing:0.25em;color:var(--gold);text-transform:uppercase;}
.hotel-name span{display:block;font-size:0.3em;font-style:italic;letter-spacing:0.4em;color:var(--gold2);opacity:0.6;margin-top:0.2em;}
.subtitle{margin-top:0.7rem;font-family:'Share Tech Mono',monospace;font-size:0.96rem;letter-spacing:0.18em;color:var(--text-dim);text-transform:uppercase;}

/* ===== フィルターバー：文字を大きく・視認性UP ===== */
.filter-bar{
  display:flex;gap:8px;flex-wrap:wrap;align-items:center;
  margin-bottom:1.4rem;padding:1rem 1.2rem;
  background:#141420;border:1px solid rgba(201,168,76,0.2);border-radius:3px;
}
.filter-label{
  font-family:'Share Tech Mono',monospace;font-size:1.2rem;
  letter-spacing:0.14em;color:#c8c0b0;margin-right:6px;text-transform:uppercase;
  font-weight:400;
}
.filter-btn{
  font-family:'Share Tech Mono',monospace;font-size:1.05rem;letter-spacing:0.08em;
  padding:6px 16px;border:1px solid rgba(200,192,176,0.3);
  background:rgba(255,255,255,0.04);color:#b0a898;
  cursor:pointer;transition:all 0.14s;border-radius:2px;
}
.filter-btn:hover{color:#e8e0d0;border-color:rgba(200,192,176,0.6);background:rgba(255,255,255,0.08);}
.filter-btn.active{color:#f0e8d8;border-color:#c9a84c;background:rgba(201,168,76,0.18);font-weight:500;}
.filter-btn.f-友好.active{color:#c8c0f0;border-color:#9088e0;background:rgba(144,136,224,0.18);}
.filter-btn.f-関連友好.active{color:#f0b0d0;border-color:#d06090;background:rgba(208,96,144,0.18);}
.filter-btn.f-企業.active{color:#88d8a8;border-color:#40a870;background:rgba(64,168,112,0.18);}
.filter-btn.f-公的.active{color:#88d8e8;border-color:#28a0b8;background:rgba(40,160,184,0.18);}
.filter-btn.f-敵対.active{color:#f09090;border-color:#d04848;background:rgba(208,72,72,0.18);}
.filter-btn.f-国家.active{color:#d8c080;border-color:#a07838;background:rgba(160,120,56,0.18);}
.filter-btn.f-職業.active{color:#c0c8b8;border-color:#809078;background:rgba(128,144,120,0.18);}

.legend-spacer{flex:1;}
.legend{display:flex;gap:12px;flex-wrap:wrap;align-items:center;}
.legend-item{display:flex;align-items:center;gap:6px;font-family:'Share Tech Mono',monospace;font-size:0.9rem;color:#a09888;}
.legend-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}

.diagram-wrap{position:relative;background:var(--bg2);border:1px solid var(--border);border-radius:2px;overflow:hidden;}
canvas#diagram{display:block;width:100%;cursor:default;}
.tooltip{
  position:fixed;background:var(--bg3);border:1px solid rgba(201,168,76,0.22);
  padding:10px 14px;font-size:1.0rem;line-height:1.6;pointer-events:none;opacity:0;

.tt-name{font-family:'Cormorant Garamond',serif;font-size:1.15rem;color:var(--gold);font-weight:400;display:block;margin-bottom:3px;}

footer{text-align:center;margin-top:1.8rem;padding-top:1.1rem;border-top:1px solid var(--border);

@keyframes fadeIn{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}

<script>
// =====================================================================
// PALETTE

const PAL = {

// =====================================================================
// DATA — 3リング分類
// =====================================================================

// ◎ 内円：敵対 + 公的機関
const RING1 = [

// ◉ 中間円：企業 + 国家 + 職業タグ
const RING2 = [

  {name:"RAVEN'S EXPRESS",         cat:'企業', url:'https://www.notion.so/0165a88c4bd24250826ddc2cc35b143b'},

  // 国家（6時：下）
  {name:'バルベルデ共和国',          cat:'国家', url:''},
  // 職業タグ（7時〜11時：左下〜左上）
  {name:'Spy',                     cat:'職業', url:''},
  {name:'Informer',                cat:'職業', url:''},

// ○ 外円：友好 + 関連友好
const RING3 = [
  {name:'八華組',                   cat:'友好',    url:'https://www.notion.so/1aa7abe41c0f80d0bd47dd3ee3f1c424'},
  {name:"La Famiglia D'Oro",       cat:'友好',    url:'https://www.notion.so/2547abe41c0f808fbaceef557f3aa2ee'},
  {name:'ローザブルーファミリー',    cat:'友好',    url:'https://www.notion.so/1727abe41c0f80799b52d6f57bad4db4'},
  {name:'零影',                     cat:'友好',    url:'https://www.notion.so/2597abe41c0f806aa999f5425a68afb3'},
  {name:'Secret Scale Service',    cat:'友好',    url:'https://www.notion.so/2617abe41c0f803caeaad3362d525e14'},
  {name:'密売対策課',                cat:'友好',    url:''},
  {name:'REvolve',                 cat:'友好',    url:''},
  {name:'ナーワル商会',              cat:'友好',    url:''},
  {name:'EMC',                     cat:'友好',    url:''},
  {name:'Silky',                   cat:'友好',    url:''},
  {name:'孤児院',                   cat:'友好',    url:''},
  {name:'テンブ・ハウスクリーニング', cat:'友好',  url:''},
  {name:"Ghoul's Grasp",           cat:'友好',    url:''},
  {name:'MHIC',                    cat:'友好',    url:''},
  // 関連友好（隣同士）
  {name:'Cradle of bellflowers',   cat:'関連友好', url:''},
  {name:'BAR REBELLION',           cat:'関連友好', url:''},
  {name:'アモルグ',                  cat:'友好',    url:''},
  {name:'TABLEEGGS',               cat:'友好',    url:''},
  {name:'ヴィーヴル商会',            cat:'友好',    url:''},
  {name:'Paradise of Bubble',      cat:'友好',    url:''},
  {name:'月蛇会',                   cat:'友好',    url:''},
  {name:'月華会',                   cat:'友好',    url:''},
  {name:'Enforcer of Justice',     cat:'友好',    url:''},
  {name:'Epithymia of Hexis',      cat:'友好',    url:''},
  {name:'StrorkCompany',           cat:'友好',    url:''},
  {name:'CW-SnackC-',              cat:'友好',    url:''},
  {name:"Kowloon&Co.",             cat:'友好',    url:''},
];

// =====================================================================
// CANVAS
// =====================================================================
const canvas = document.getElementById('diagram');
const tooltip = document.getElementById('tooltip');
const ttName  = document.getElementById('tt-name');
const ttType  = document.getElementById('tt-type');
const ttLink  = document.getElementById('tt-link');

let W, H, cx, cy, DPR;
let R1, R2, R3;           // 各リングの半径
let FS1, FS2, FS3;        // 各リングのフォントサイズ
let NODE_H1, NODE_H2, NODE_H3; // 各リングのノード高さ
let activeFilter = 'all';
let nodes = [];
let hoveredNode = null;

// テキスト幅を近似計算（Canvas の measureText の代替）
function approxTextWidth(name, fs){
  const charsEn = (name.match(/[A-Za-z0-9\s'\-&.]/g)||[]).length;
  const charsJp  = name.length - charsEn;
  return charsEn*(fs*0.58) + charsJp*(fs*0.92);
}

function calcNodeW(name, fs, pad){
  return Math.max(approxTextWidth(name, fs) + pad, fs * 3.5);
}

// 各リングに必要な最小半径を計算（全ノードが重ならない円周）
function minRadius(data, fs, nodeH, gap){
  const total = data.reduce((s,d) => s + calcNodeW(d.name, fs, nodeH*1.2) + gap, 0);
  return total / (2 * Math.PI);
}

function resize(){
  const wrap = canvas.parentElement;
  DPR = window.devicePixelRatio || 1;
  W   = wrap.clientWidth;

  // フォントサイズ（画面幅に応じてスケール）
  const sc = Math.min(W / 1400, 1.0);
  FS1 = Math.max(10, 13 * sc);
  FS2 = Math.max(9.5, 12.5 * sc);
  FS3 = Math.max(9, 12 * sc);

  NODE_H1 = FS1 * 2.2;
  NODE_H2 = FS2 * 2.2;
  NODE_H3 = FS3 * 2.2;

  const GAP1 = FS1 * 1.4;
  const GAP2 = FS2 * 1.2;
  const GAP3 = FS3 * 1.0;

  // 各リングの半径（最小値 or 画面比率の大きい方）
  R1 = Math.max(minRadius(RING1, FS1, NODE_H1, GAP1), W * 0.16);
  R2 = Math.max(minRadius(RING2, FS2, NODE_H2, GAP2), R1 + NODE_H1 + NODE_H2 + FS1*2);
  R3 = Math.max(minRadius(RING3, FS3, NODE_H3, GAP3), R2 + NODE_H2 + NODE_H3 + FS2*2);

  // キャンバスサイズ：外円が収まる高さ
  H = (R3 + NODE_H3 + 24) * 2;
  canvas.width  = W * DPR;
  canvas.height = H * DPR;
  canvas.style.width  = W + 'px';
  canvas.style.height = H + 'px';

  cx = W / 2;
  cy = H / 2;

  buildNodes();
  draw();
}

function buildNodes(){
  nodes = [];

  // 中心
  const cfs = Math.max(15, FS1 * 1.5);
  const cw  = Math.max(170, cfs * 10.5);
  const ch  = Math.max(54,  cfs * 3.2);
  nodes.push({
    cx, cy, w:cw, h:ch, fs:cfs, ring:0, isCenter:true,
    data:{name:'ホテルカデシュ', cat:'center', url:'https://www.notion.so/d139ea4a69fc4ec389ebb0803f732372'}
  });

  // RING1
  placeRing(RING1, R1, FS1, NODE_H1, 1);
  // RING2
  placeRing(RING2, R2, FS2, NODE_H2, 2);
  // RING3
  placeRing(RING3, R3, FS3, NODE_H3, 3);
}

function placeRing(data, R, fs, nh, ringIdx){
  const n = data.length;
  data.forEach((d, i) => {
    const angle = (i / n) * Math.PI * 2 - Math.PI / 2;
    const nw = calcNodeW(d.name, fs, nh * 1.2);
    nodes.push({
      cx: cx + Math.cos(angle) * R,
      cy: cy + Math.sin(angle) * R,
      w: nw, h: nh, fs, ring: ringIdx, isCenter:false,
      data: d
    });
  });
}

// =====================================================================
// DRAW
// =====================================================================
function draw(){
  const ctx = canvas.getContext('2d');
  ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
  ctx.clearRect(0, 0, W, H);

  // 背景グロー
  const grad = ctx.createRadialGradient(cx, cy, 0, cx, cy, R3 * 1.1);
  grad.addColorStop(0,   'rgba(201,168,76,0.04)');
  grad.addColorStop(0.55,'rgba(8,6,4,0)');
  grad.addColorStop(1,   'transparent');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);

  // 軌道円
  drawOrbit(ctx, R1, 'rgba(201,168,76,0.06)');
  drawOrbit(ctx, R2, 'rgba(201,168,76,0.05)');
  drawOrbit(ctx, R3, 'rgba(201,168,76,0.04)');

  // ノード描画（ホバー以外）
  nodes.forEach(n => {
    if(n === hoveredNode) return;
    const vis = n.isCenter || isVisible(n.data.cat);
    ctx.save();
    ctx.globalAlpha = vis ? 1 : 0.07;
    drawNode(ctx, n, false);
    ctx.restore();
  });
  // ホバー最前面
  if(hoveredNode){
    ctx.save(); ctx.globalAlpha = 1;
    drawNode(ctx, hoveredNode, true);
    ctx.restore();
  }
}

function drawOrbit(ctx, r, color){
  ctx.save();
  ctx.beginPath();
  ctx.arc(cx, cy, r, 0, Math.PI*2);
  ctx.strokeStyle = color;
  ctx.lineWidth = 1;
  ctx.setLineDash([2, 9]);
  ctx.stroke();
  ctx.setLineDash([]);
  ctx.restore();
}

function drawNode(ctx, n, hovered){
  const isCenter = n.isCenter;
  const p  = isCenter ? PAL.center : (PAL[n.data.cat] || PAL['友好']);
  const x  = n.cx - n.w/2, y = n.cy - n.h/2;
  const w  = n.w, h = n.h;
  const r  = isCenter ? h/2 : 3;
  const fs = n.fs;

  ctx.save();

  // グロー
  if(isCenter || hovered){
    ctx.shadowColor = p.stroke;
    ctx.shadowBlur  = isCenter ? 22 : 14;
  }

  // 背景
  ctx.beginPath(); rrect(ctx, x, y, w, h, r);
  ctx.fillStyle = p.fill; ctx.fill();
  ctx.shadowBlur = 0;

  // 枠線
  ctx.beginPath(); rrect(ctx, x, y, w, h, r);
  ctx.strokeStyle = hovered ? p.stroke : (isCenter ? p.stroke : p.stroke + (hovered ? 'ff' : 'aa'));
  ctx.lineWidth   = isCenter ? 1.6 : (hovered ? 1.2 : 0.8);
  ctx.stroke();

  if(isCenter){
    // 装飾二重枠
    ctx.beginPath(); rrect(ctx, x+5, y+5, w-10, h-10, r-5);
    ctx.strokeStyle = p.stroke + '30'; ctx.lineWidth = 0.5; ctx.stroke();
  } else {
    // 上部アクセントライン
    ctx.fillStyle = hovered ? p.stroke : p.stroke + 'cc';
    ctx.fillRect(x, y, w, 1.8);
  }

  // テキスト
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';

  if(isCenter){
    ctx.font = `300 ${fs}px 'Cormorant Garamond', serif`;
    ctx.fillStyle = p.text;
    ctx.fillText('HOTEL QADESH', n.cx, n.cy - fs * 0.55);
    ctx.font = `400 ${fs * 0.62}px 'Noto Serif JP', serif`;
    ctx.fillStyle = p.sub;
    ctx.fillText('ホテルカデシュ', n.cx, n.cy + fs * 0.62);
  } else {
    const name = n.data.name;
    const isJP = /[\u3000-\u9fff]/.test(name);
    const fam  = isJP ? "'Noto Serif JP',serif" : "'Share Tech Mono',monospace";
    ctx.font = `400 ${fs}px ${fam}`;
    ctx.fillStyle = hovered ? p.text : p.text + 'e8';
    ctx.fillText(name, n.cx, n.cy);
  }

  ctx.restore();
}

function rrect(ctx, x, y, w, h, r){
  r = Math.min(r, w/2, h/2);
  ctx.moveTo(x+r, y); ctx.lineTo(x+w-r, y); ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r); ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h); ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r); ctx.quadraticCurveTo(x,y,x+r,y); ctx.closePath();
}

function isVisible(cat){
  if(activeFilter === 'all') return true;
  if(activeFilter === '公的') return cat === '公的';
  return cat === activeFilter;
}

// =====================================================================
// INTERACTION
// =====================================================================
function getNode(mx, my){
  for(let i = nodes.length-1; i >= 0; i--){
    const n = nodes[i];
    if(mx >= n.cx-n.w/2 && mx <= n.cx+n.w/2 &&
       my >= n.cy-n.h/2 && my <= n.cy+n.h/2) return n;
  }
  return null;
}

canvas.addEventListener('mousemove', e => {
  const r  = canvas.getBoundingClientRect();
  const mx = e.clientX - r.left;
  const my = e.clientY - r.top;
  const n  = getNode(mx, my);
  if(n !== hoveredNode){ hoveredNode = n; draw(); }
  canvas.style.cursor = (n && n.data.url) ? 'pointer' : 'default';
  if(n){
    ttName.textContent = n.data.name;
    ttType.textContent = n.isCenter ? '中心' : n.data.cat;
    const u = n.data.url;
    ttLink.textContent  = u ? '→ Notionで開く' : '';
    ttLink.style.display = u ? 'block' : 'none';
    let tx = e.clientX+18, ty = e.clientY+12;
    if(tx+260 > window.innerWidth)  tx = e.clientX-270;
    if(ty+90  > window.innerHeight) ty = e.clientY-80;
    tooltip.style.left = tx+'px'; tooltip.style.top = ty+'px';
    tooltip.classList.add('show');
  } else {
    tooltip.classList.remove('show');
  }
});
canvas.addEventListener('mouseleave', () => {
  hoveredNode = null;
  tooltip.classList.remove('show');
  draw();
});
canvas.addEventListener('click', e => {
  const r = canvas.getBoundingClientRect();
  const n = getNode(e.clientX-r.left, e.clientY-r.top);
  if(n && n.data.url) window.open(n.data.url, '_blank');
});
document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    activeFilter = btn.dataset.filter;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    draw();
  });
});

window.addEventListener('resize', resize);
resize();
</script>
</body>
</html>
