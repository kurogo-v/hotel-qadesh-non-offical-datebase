<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hotel Qadesh — Unofficial Database</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300&family=Noto+Serif+JP:wght@300;400&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#000000;--bg2:#06060a;--bg3:#0c0c12;--bg4:#121218;
  --silver:#c8c8d0;--silver2:#a0a0ac;--silver3:#585868;
  --border:rgba(200,200,208,0.1);--border2:rgba(200,200,208,0.18);
  --gold:#c9a84c;--gold2:#e8c96a;
  --text:#c0c0c8;--text-dim:#484858;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;}
body{background:var(--bg);color:var(--text);font-family:'Noto Serif JP',serif;overflow:hidden;}
.screen{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity 0.7s ease;z-index:10;background:var(--bg);}
.screen.active{opacity:1;pointer-events:all;}
#mainScreen{position:fixed;inset:0;display:flex;flex-direction:column;opacity:0;pointer-events:none;transition:opacity 0.7s ease;z-index:10;background:var(--bg);overflow:hidden;}
#mainScreen.active{opacity:1;pointer-events:all;}

/* ===== LOGIN ===== */
#loginScreen{background:radial-gradient(ellipse 50% 40% at 50% 50%,rgba(200,200,208,0.025) 0%,transparent 70%),#000;}
.login-wrap{width:100%;max-width:680px;padding:0 2rem;}
.login-title{text-align:center;margin-bottom:1.8rem;}
.login-main{font-family:'Cormorant Garamond',serif;font-size:clamp(1.9rem,5.5vw,3rem);font-weight:300;letter-spacing:0.25em;color:var(--silver);text-transform:uppercase;line-height:1.05;}
.login-sub{font-family:'Cormorant Garamond',serif;font-size:clamp(0.95rem,2.8vw,1.4rem);font-weight:300;font-style:italic;letter-spacing:0.35em;color:var(--silver3);margin-top:0.45em;text-transform:uppercase;}
.login-divider{width:100%;height:1px;background:var(--border2);margin:0 0 1.6rem;position:relative;}
.login-divider::after{content:'';position:absolute;left:50%;transform:translateX(-50%);top:-1.5px;width:34px;height:3px;background:var(--silver3);opacity:0.35;}
.notice-box{background:rgba(200,200,208,0.03);border:1px solid var(--border);border-radius:2px;padding:1.3rem 1.5rem;margin-bottom:1.6rem;}
.notice-title{font-family:'Share Tech Mono',monospace;font-size:0.95rem;letter-spacing:0.18em;color:var(--silver3);text-transform:uppercase;margin-bottom:0.85rem;}
.notice-list{list-style:none;display:flex;flex-direction:column;gap:0.85rem;}
.notice-list li{font-family:'Noto Serif JP',serif;font-size:1.1rem;line-height:1.82;color:rgba(196,196,204,0.68);padding-left:2em;position:relative;}
.notice-list li::before{content:attr(data-num);position:absolute;left:0;font-family:'Share Tech Mono',monospace;font-size:0.88rem;color:var(--silver3);top:0.2em;}
.notice-warn{color:rgba(215,198,168,0.73)!important;}
.login-form{display:flex;flex-direction:column;gap:0.95rem;}
.input-group{display:flex;flex-direction:column;gap:0.4rem;}
.input-label{font-family:'Share Tech Mono',monospace;font-size:0.95rem;letter-spacing:0.2em;color:var(--silver3);text-transform:uppercase;}
.input-field{background:rgba(200,200,208,0.035);border:1px solid var(--border2);border-radius:2px;padding:0.78rem 1.1rem;font-family:'Share Tech Mono',monospace;font-size:1.15rem;color:rgba(200,200,208,0.38);letter-spacing:0.25em;outline:none;cursor:not-allowed;user-select:none;}
.login-btn{margin-top:0.4rem;padding:0.92rem 1rem;background:rgba(200,200,208,0.06);border:1px solid var(--border2);border-radius:2px;font-family:'Share Tech Mono',monospace;font-size:1.1rem;letter-spacing:0.35em;color:var(--silver);cursor:pointer;text-transform:uppercase;transition:all 0.18s;}
.login-btn:hover{background:rgba(200,200,208,0.13);border-color:rgba(200,200,208,0.38);color:#e0e0e8;}
.login-btn:active{transform:scale(0.98);}

/* ===== MAIN ===== */
.main-header{flex-shrink:0;text-align:center;padding:1rem 1.5rem 0.7rem;border-bottom:1px solid rgba(201,168,76,0.1);}
.hotel-name{font-family:'Cormorant Garamond',serif;font-size:clamp(1.5rem,2.8vw,2.4rem);font-weight:300;letter-spacing:0.25em;color:var(--gold);text-transform:uppercase;}
.hotel-name span{display:block;font-size:0.28em;font-style:italic;letter-spacing:0.4em;color:var(--gold2);opacity:0.55;margin-top:0.15em;}

/* ナビゲーションタブ */
.nav-bar{flex-shrink:0;display:flex;align-items:stretch;gap:0;padding:0 1.5rem 0;border-bottom:1px solid rgba(200,200,208,0.08);}
.nav-tabs{display:flex;align-items:stretch;gap:0;flex-shrink:0;}
.nav-btn{font-family:'Share Tech Mono',monospace;font-size:1.05rem;letter-spacing:0.18em;padding:0.55rem 2rem;background:transparent;border:none;border-bottom:2px solid transparent;color:var(--silver3);cursor:pointer;transition:all 0.16s;text-transform:uppercase;position:relative;top:1px;}
.nav-btn:hover{color:var(--silver2);}
.nav-btn.active{color:var(--gold);border-bottom-color:var(--gold);}
/* 検索バー */
.nav-search{flex:1;display:flex;align-items:center;justify-content:flex-end;padding:0.4rem 0 0.4rem 1.5rem;}
.search-wrap{position:relative;width:min(280px,100%);}
.search-input{width:100%;background:rgba(200,200,208,0.06);border:1px solid rgba(200,200,208,0.15);border-radius:2px;padding:0.42rem 2.2rem 0.42rem 0.85rem;font-family:'Share Tech Mono',monospace;font-size:0.88rem;letter-spacing:0.06em;color:var(--silver2);outline:none;transition:all 0.18s;}
.search-input::placeholder{color:var(--silver3);letter-spacing:0.08em;}
.search-input:focus{border-color:rgba(200,200,208,0.35);background:rgba(200,200,208,0.09);color:var(--silver);}
.search-icon{position:absolute;right:0.65rem;top:50%;transform:translateY(-50%);color:var(--silver3);font-size:0.82rem;pointer-events:none;font-family:'Share Tech Mono',monospace;}
.search-clear{position:absolute;right:0.6rem;top:50%;transform:translateY(-50%);color:var(--silver3);font-size:0.9rem;cursor:pointer;background:transparent;border:none;padding:0;line-height:1;display:none;transition:color 0.13s;}
.search-clear:hover{color:var(--silver);}
/* 検索結果ドロップダウン */
.search-dropdown{position:absolute;top:calc(100% + 6px);left:0;right:0;background:var(--bg3);border:1px solid var(--border2);border-radius:2px;z-index:500;max-height:340px;overflow-y:auto;box-shadow:0 12px 40px rgba(0,0,0,0.85);display:none;}
.search-dropdown.show{display:block;}
.search-dropdown::-webkit-scrollbar{width:4px;}
.search-dropdown::-webkit-scrollbar-thumb{background:rgba(200,200,208,0.12);border-radius:2px;}
.search-result-item{padding:0.6rem 0.9rem;border-bottom:1px solid rgba(200,200,208,0.055);cursor:pointer;transition:background 0.1s;display:flex;justify-content:space-between;align-items:flex-start;gap:8px;}
.search-result-item:hover{background:rgba(200,200,208,0.05);}
.search-result-item:last-child{border-bottom:none;}
.search-result-name{font-family:'Noto Serif JP',serif;font-size:0.92rem;color:var(--text);line-height:1.35;}
.search-result-tags{display:flex;gap:3px;flex-wrap:wrap;margin-top:3px;}
.search-result-num{font-family:'Share Tech Mono',monospace;font-size:0.68rem;color:var(--gold);opacity:0.6;flex-shrink:0;padding-top:1px;}
.search-no-result{padding:1rem 0.9rem;font-family:'Share Tech Mono',monospace;font-size:0.78rem;color:var(--text-dim);text-align:center;letter-spacing:0.08em;}
.search-loading-row{padding:0.8rem 0.9rem;display:flex;align-items:center;gap:7px;font-family:'Share Tech Mono',monospace;font-size:0.78rem;color:var(--text-dim);}

/* キャンバスエリア */
.canvas-area{flex:1;min-height:0;position:relative;overflow:hidden;}
canvas#diagram{display:block;width:100%;height:100%;cursor:default;}

/* ===== MODAL 1 ===== */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,2,0.9);display:flex;align-items:center;justify-content:center;z-index:100;opacity:0;pointer-events:none;transition:opacity 0.25s ease;}
.modal-overlay.open{opacity:1;pointer-events:all;}
.modal{width:min(560px,94vw);max-height:82vh;background:var(--bg3);border:1px solid var(--border2);border-radius:3px;display:flex;flex-direction:column;transform:translateY(14px) scale(0.97);transition:transform 0.25s ease;box-shadow:0 24px 64px rgba(0,0,0,0.95);}
.modal-overlay.open .modal{transform:translateY(0) scale(1);}
.modal-header{padding:1rem 1.2rem 0.8rem;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;position:relative;}
.modal-header::after{content:'';position:absolute;bottom:-1px;left:1.2rem;width:26px;height:1px;background:var(--gold);}
.modal-title-wrap{display:flex;align-items:center;gap:8px;}
.modal-cat-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
.modal-title{font-family:'Cormorant Garamond',serif;font-size:1.35rem;color:var(--gold);font-weight:300;letter-spacing:0.1em;}
.modal-close{background:transparent;border:1px solid var(--border2);color:var(--silver3);font-size:0.95rem;width:28px;height:28px;border-radius:2px;cursor:pointer;transition:all 0.14s;display:flex;align-items:center;justify-content:center;font-family:'Share Tech Mono',monospace;}
.modal-close:hover{color:var(--silver);border-color:var(--silver2);}
.modal-subtitle{font-family:'Share Tech Mono',monospace;font-size:0.68rem;color:var(--text-dim);letter-spacing:0.1em;text-transform:uppercase;padding:0.4rem 1.2rem;border-bottom:1px solid rgba(200,200,208,0.05);flex-shrink:0;}
.modal-body{flex:1;overflow-y:auto;padding:0.9rem 1.2rem;}
.modal-body::-webkit-scrollbar{width:4px;}
.modal-body::-webkit-scrollbar-thumb{background:rgba(200,200,208,0.12);border-radius:2px;}
.char-card{padding:0.6rem 0;border-bottom:1px solid rgba(200,200,208,0.055);cursor:pointer;transition:background 0.12s;display:flex;justify-content:space-between;align-items:flex-start;gap:10px;}
.char-card:hover{background:rgba(200,200,208,0.04);margin:0 -0.5rem;padding:0.6rem 0.5rem;border-radius:2px;}
.char-card:last-child{border-bottom:none;}
.char-left{flex:1;min-width:0;}
.char-name{font-family:'Noto Serif JP',serif;font-size:0.98rem;color:var(--text);line-height:1.4;}
.char-tags{display:flex;gap:4px;flex-wrap:wrap;margin-top:4px;}
.char-tag{font-family:'Share Tech Mono',monospace;font-size:0.58rem;padding:2px 5px;border-radius:2px;letter-spacing:0.04em;white-space:nowrap;}
.char-num{font-family:'Share Tech Mono',monospace;font-size:0.7rem;color:var(--gold);opacity:0.6;flex-shrink:0;padding-top:2px;}
.modal-count-bar{font-family:'Share Tech Mono',monospace;font-size:0.68rem;color:var(--text-dim);padding:0 0 0.6rem;margin-bottom:0.3rem;border-bottom:1px solid rgba(200,200,208,0.055);letter-spacing:0.06em;}
.modal-loading{display:flex;align-items:center;justify-content:center;height:120px;gap:8px;font-family:'Share Tech Mono',monospace;font-size:0.82rem;color:var(--text-dim);}
.spinner{width:16px;height:16px;border:2px solid rgba(200,200,208,0.1);border-top-color:var(--silver2);border-radius:50%;animation:spin 0.8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.modal-empty{text-align:center;padding:1.8rem 1rem;font-family:'Share Tech Mono',monospace;font-size:0.8rem;color:var(--text-dim);line-height:2;}
.tag-敵対{background:rgba(208,72,72,0.12);color:#e07878;border:1px solid rgba(208,72,72,0.2);}
.tag-公的{background:rgba(40,160,184,0.12);color:#60c8d8;border:1px solid rgba(40,160,184,0.2);}
.tag-企業{background:rgba(64,168,112,0.12);color:#60c898;border:1px solid rgba(64,168,112,0.2);}
.tag-友好{background:rgba(144,136,224,0.12);color:#b0a8e8;border:1px solid rgba(144,136,224,0.2);}
.tag-国家{background:rgba(160,120,56,0.12);color:#c0a060;border:1px solid rgba(160,120,56,0.2);}
.tag-職種{background:rgba(128,144,120,0.12);color:#a0b098;border:1px solid rgba(128,144,120,0.2);}
.tag-Member{background:rgba(201,168,76,0.12);color:#d4b840;border:1px solid rgba(201,168,76,0.2);}
.tag-other{background:rgba(100,100,110,0.1);color:#888898;border:1px solid rgba(100,100,110,0.2);}
.subcat-btn{display:inline-flex;align-items:center;gap:6px;padding:0.48rem 0.85rem;background:rgba(200,200,208,0.04);border:1px solid rgba(200,200,208,0.16);border-radius:2px;font-family:'Share Tech Mono',monospace;font-size:0.88rem;color:var(--silver2);cursor:pointer;transition:all 0.13s;margin:0 5px 5px 0;}
.subcat-btn:hover{background:rgba(200,200,208,0.09);border-color:rgba(200,200,208,0.38);color:var(--silver);}
.subcat-btn.cat-敵対{border-color:rgba(208,72,72,0.28);color:#e07878;}
.subcat-btn.cat-敵対:hover{background:rgba(208,72,72,0.09);}
.subcat-btn.cat-職種{border-color:rgba(128,144,120,0.28);color:#a0b098;}
.subcat-btn.cat-職種:hover{background:rgba(128,144,120,0.09);}
.icon-grid{display:flex;flex-wrap:wrap;gap:0.9rem;margin-top:0.7rem;}
.icon-card{display:flex;flex-direction:column;align-items:center;gap:0.4rem;cursor:pointer;transition:opacity 0.15s;width:78px;}
.icon-card:hover{opacity:0.8;}
.icon-avatar{width:70px;height:70px;border-radius:4px;overflow:hidden;border:1px solid var(--border2);background:var(--bg4);flex-shrink:0;}
.icon-avatar img{width:100%;height:100%;object-fit:cover;object-position:center top;}
.icon-name{font-family:'Noto Serif JP',serif;font-size:0.7rem;color:var(--text);text-align:center;line-height:1.3;max-width:76px;word-break:break-all;}
.icon-sub{font-family:'Share Tech Mono',monospace;font-size:0.56rem;color:var(--text-dim);text-align:center;}
.divider-line{height:1px;background:rgba(200,200,208,0.065);margin:0.8rem 0;}
.preparing-modal{text-align:center;padding:2.5rem 1rem;}
.preparing-text{font-family:'Cormorant Garamond',serif;font-size:1.8rem;color:var(--silver3);font-weight:300;letter-spacing:0.2em;}
.preparing-sub{font-family:'Share Tech Mono',monospace;font-size:0.72rem;color:var(--text-dim);letter-spacing:0.18em;margin-top:0.6rem;text-transform:uppercase;}

/* ===== MODAL 2 (くろご詳細) ===== */
.modal2-overlay{position:fixed;inset:0;background:rgba(0,0,2,0.93);display:flex;align-items:center;justify-content:center;z-index:200;opacity:0;pointer-events:none;transition:opacity 0.22s ease;}
.modal2-overlay.open{opacity:1;pointer-events:all;}
.modal2{width:min(740px,96vw);max-height:92vh;background:var(--bg3);border:1px solid rgba(201,168,76,0.22);border-radius:3px;display:flex;flex-direction:column;transform:translateY(12px) scale(0.97);transition:transform 0.22s ease;box-shadow:0 30px 80px rgba(0,0,0,0.98);overflow:hidden;}
.modal2-overlay.open .modal2{transform:translateY(0) scale(1);}
.modal2-header{padding:0.85rem 1.2rem;border-bottom:1px solid rgba(201,168,76,0.1);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.modal2-title{font-family:'Cormorant Garamond',serif;font-size:1.2rem;color:var(--gold);font-weight:300;letter-spacing:0.1em;}
.modal2-close{background:transparent;border:1px solid rgba(201,168,76,0.18);color:rgba(201,168,76,0.45);font-size:0.9rem;width:26px;height:26px;border-radius:2px;cursor:pointer;transition:all 0.13s;display:flex;align-items:center;justify-content:center;font-family:'Share Tech Mono',monospace;}
.modal2-close:hover{color:var(--gold);border-color:var(--gold);}
.modal2-body{flex:1;overflow-y:auto;padding:1rem 1.2rem;}
.modal2-body::-webkit-scrollbar{width:4px;}
.modal2-body::-webkit-scrollbar-thumb{background:rgba(201,168,76,0.15);border-radius:2px;}
.full-img{width:100%;border-radius:2px;border:1px solid var(--border);margin-bottom:1rem;display:block;}
.corr-canvas-wrap{border:1px solid var(--border);border-radius:2px;overflow:hidden;background:#06060e;}
canvas.corr-canvas{display:block;width:100%;}
.corr-memo{margin-top:0.85rem;background:rgba(200,200,208,0.035);border:1px solid rgba(200,200,208,0.09);border-radius:2px;padding:0.75rem 0.95rem;}
.corr-memo-label{font-family:'Share Tech Mono',monospace;font-size:0.62rem;color:var(--text-dim);letter-spacing:0.14em;text-transform:uppercase;margin-bottom:0.45rem;}
.corr-memo-text{font-family:'Noto Serif JP',serif;font-size:0.88rem;color:rgba(196,196,204,0.72);line-height:1.75;}

.tooltip{position:fixed;background:var(--bg3);border:1px solid var(--border2);padding:6px 11px;font-size:0.88rem;line-height:1.5;pointer-events:none;opacity:0;transition:opacity 0.1s;max-width:200px;z-index:300;color:var(--text);font-family:'Noto Serif JP',serif;box-shadow:0 4px 18px rgba(0,0,0,0.85);}
.tooltip.show{opacity:1;}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}
</style>
</head>
<body>

<!-- LOGIN -->
<div class="screen active" id="loginScreen">
  <div class="login-wrap">
    <div class="login-title">
      <div class="login-main">Hotel Qadesh</div>
      <div class="login-sub">Unofficial Database</div>
    </div>
    <div class="login-divider"></div>
    <div class="notice-box">
      <div class="notice-title">— Notice —</div>
      <ol class="notice-list">
        <li data-num="1.">本システムは公式とは一切関係のない非公式品であり、カデシュ・プロジェクト様と一切関係がありません。</li>
        <li data-num="2.">掲載された情報については全て許可を取ったものであり、また常に追加・修正・削除を受け付けています。</li>
        <li data-num="3." class="notice-warn">事前に情報を閲覧すると、本来"知らずに出会うことで生まれる高揚感や運命的な邂逅の体験"が損なわれる可能性があります。</li>
      </ol>
    </div>
    <div class="login-form">
      <div class="input-group"><div class="input-label">ID</div><div class="input-field">*****</div></div>
      <div class="input-group"><div class="input-label">Password</div><div class="input-field">*****</div></div>
      <button class="login-btn" id="loginBtn">Login</button>
    </div>
  </div>
</div>

<!-- MAIN -->
<div id="mainScreen">
  <div class="main-header">
    <div class="hotel-name">Hotel Qadesh<span>ホテルカデシュ — Unofficial Database</span></div>
  </div>
  <div class="nav-bar">
    <div class="nav-tabs">
      <button class="nav-btn active" data-nav="profiles">Profiles</button>
      <button class="nav-btn" data-nav="organization">Organization</button>
      <button class="nav-btn" data-nav="world">World</button>
    </div>
    <div class="nav-search">
      <div class="search-wrap">
        <input class="search-input" id="searchInput" type="text" placeholder="Search name...">
        <span class="search-icon" id="searchIcon">⌕</span>
        <button class="search-clear" id="searchClear">✕</button>
        <div class="search-dropdown" id="searchDropdown"></div>
      </div>
    </div>
  </div>
  <div class="canvas-area">
    <canvas id="diagram"></canvas>
  </div>
</div>

<!-- MODAL 1 -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal" id="modal">
    <div class="modal-header">
      <div class="modal-title-wrap">
        <span class="modal-cat-dot" id="modalDot" style="background:var(--gold)"></span>
        <span class="modal-title" id="modalTitle">ホテルカデシュ</span>
      </div>
      <button class="modal-close" id="modalClose">✕</button>
    </div>
    <div class="modal-subtitle" id="modalSubtitle">—</div>
    <div class="modal-body" id="modalBody"></div>
  </div>
</div>

<!-- MODAL 2 -->
<div class="modal2-overlay" id="modal2Overlay">
  <div class="modal2">
    <div class="modal2-header">
      <span class="modal2-title" id="modal2Title">くろご</span>
      <button class="modal2-close" id="modal2Close">✕</button>
    </div>
    <div class="modal2-body" id="modal2Body"></div>
  </div>
</div>

const searchInput    = document.getElementById('searchInput');
const searchClear    = document.getElementById('searchClear');
const searchIcon     = document.getElementById('searchIcon');
const searchDropdown = document.getElementById('searchDropdown');
let searchTimer = null;

function escapeHtml(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// 検索フィールドと優先順位の定義
// matchField: ヒットしたフィールド名を返す（表示用ラベルに使う）
function getSearchFields(c){
  return [
    { key:'name',        value: c.name||'',                          label:null },
    { key:'nationality', value: c.nationality||'',                   label:'国籍' },
    { key:'number',      value: c.number&&c.number!=='-'?c.number:'', label:'No.' },
    { key:'keyword',     value: c.keyword||'',                       label:'キーワード' },
    // affiliations（所属タグ）は配列なので結合して検索
    { key:'affiliations',value:(c.affiliations||[]).join(' '),        label:'所属' },
  ];
}

function highlightText(text, q){
  const idx = text.toLowerCase().indexOf(q);
  if(idx < 0) return escapeHtml(text);
  return escapeHtml(text.slice(0,idx))
    + `<span style="color:var(--gold);font-weight:500">${escapeHtml(text.slice(idx,idx+q.length))}</span>`
    + escapeHtml(text.slice(idx+q.length));
}

function renderSearchResults(chars, query){
  const q = query.trim().toLowerCase();
  if(!q){ searchDropdown.classList.remove('show'); return; }

  // 各キャラについてどのフィールドにヒットしたかを記録
  const hits = chars.map(c=>{
    const fields = getSearchFields(c);
    const matched = fields.find(f => f.value.toLowerCase().includes(q));
    return matched ? { c, matched } : null;
  }).filter(Boolean).slice(0, 25);

  if(!hits.length){
    searchDropdown.innerHTML=`<div class="search-no-result">— No results for "${escapeHtml(query)}" —</div>`;
    searchDropdown.classList.add('show'); return;
  }

  const html = hits.map(({c, matched})=>{
    const hasNum = c.number && c.number!=='-';
    const numStr = hasNum ? `<span class="search-result-num">No.${escapeHtml(c.number)}</span>` : '';
    const tagHtml = (c.affiliations||[]).slice(0,3).map(a=>
      `<span class="char-tag tag-${TAG_TO_CAT[a]||'other'}">${escapeHtml(a)}</span>`
    ).join('');
    const pid = (c.pageId||'').replace(/-/g,'');
    const oc  = pid ? `onclick="window.open('https://www.notion.so/${pid}','_blank')"` : '';

    // 名前は常にハイライト付きで表示
    const nameHighlighted = highlightText(c.name||'', q);

    // 名前以外のフィールドにヒットした場合はヒット箇所を補足表示
    let matchHint = '';
    if(matched.key !== 'name' && matched.label){
      // affiliation は配列から個別にマッチしたものを探す
      let hitVal = matched.value;
      if(matched.key === 'affiliations'){
        const af = (c.affiliations||[]).find(a=>a.toLowerCase().includes(q));
        hitVal = af || matched.value;
      }
      matchHint = `<div style="font-family:'Share Tech Mono',monospace;font-size:0.58rem;color:var(--text-dim);margin-top:2px;">${escapeHtml(matched.label)}: ${highlightText(hitVal.slice(0,40),q)}</div>`;
    }

    return `<div class="search-result-item" ${oc}>
      <div class="char-left">
        <div class="search-result-name">${nameHighlighted}</div>
        ${matchHint}
        <div class="search-result-tags">${tagHtml}</div>
      </div>${numStr}
    </div>`;
  }).join('');

  searchDropdown.innerHTML = html;
  searchDropdown.classList.add('show');
}

searchInput.addEventListener('input', ()=>{
  const val = searchInput.value;
  // クリアボタンの表示切替
  searchClear.style.display  = val ? 'block' : 'none';
  searchIcon.style.display   = val ? 'none'  : 'block';

  clearTimeout(searchTimer);
  if(!val.trim()){ searchDropdown.classList.remove('show'); return; }

  // キャッシュがあればすぐ検索、なければローディング表示してフェッチ
  if(charCache){
    renderSearchResults(charCache, val);
  } else {
    searchDropdown.innerHTML=`<div class="search-loading-row"><div class="spinner"></div>読み込み中...</div>`;
    searchDropdown.classList.add('show');
    searchTimer = setTimeout(async ()=>{
      const chars = await fetchChars();
      if(chars && searchInput.value) renderSearchResults(chars, searchInput.value);
    }, 300);
  }
});

searchClear.addEventListener('click', ()=>{
  searchInput.value='';
  searchClear.style.display='none';
  searchIcon.style.display='block';
  searchDropdown.classList.remove('show');
  searchInput.focus();
});

// ドロップダウン外クリックで閉じる
document.addEventListener('click', e=>{
  if(!e.target.closest('.search-wrap')) searchDropdown.classList.remove('show');
});

// ESCキーで検索をクリア
searchInput.addEventListener('keydown', e=>{
  if(e.key==='Escape'){ searchInput.value=''; searchClear.style.display='none'; searchIcon.style.display='block'; searchDropdown.classList.remove('show'); }
});

const canvas=document.getElementById('diagram');
const tooltip=document.getElementById('tooltip');
let W,H,cx,cy,DPR,ORBIT_R,CENTER_W,CENTER_H;
let hoveredNode=null,nodes=[],charCache=null,fetchPromise=null;

const BASE_MIN=56,BASE_MAX=136; // 2倍サイズ
const allCounts=Object.values(CATS).map(c=>c.count);
const minC=Math.min(...allCounts),maxC=Math.max(...allCounts);
function catRadius(count,sw){
  const t=(count-minC)/(maxC-minC);
  return (BASE_MIN+t*(BASE_MAX-BASE_MIN))*Math.min(sw/1400,1.0);
}

function resize(){
  const area=canvas.parentElement;
  DPR=window.devicePixelRatio||1;
  W=area.clientWidth; H=area.clientHeight;
  CENTER_W=Math.max(140,W*0.12); CENTER_H=Math.max(46,W*0.04);
  const maxR=catRadius(maxC,W);
  // 参考画像のように近めの配置：楕円+ノード半径+短い間隔
  ORBIT_R=Math.min(CENTER_W*0.5+maxR+W*0.06, Math.min(W,H)*0.38);
  canvas.width=W*DPR; canvas.height=H*DPR;
  canvas.style.width=W+'px'; canvas.style.height=H+'px';
  cx=W/2; cy=H/2;
  buildNodes(); draw();
}

function buildNodes(){
  nodes=[];
  nodes.push({type:'center',cx,cy,w:CENTER_W,h:CENTER_H,cat:'center'});
  const keys=Object.keys(CATS);
  keys.forEach((key,i)=>{
    const angle=(i/keys.length)*Math.PI*2-Math.PI/2;
    const r=catRadius(CATS[key].count,W);
    nodes.push({type:'circle',cat:key,cx:cx+Math.cos(angle)*ORBIT_R,cy:cy+Math.sin(angle)*ORBIT_R,r,count:CATS[key].count});
  });
}

function draw(){
  const ctx=canvas.getContext('2d');
  ctx.setTransform(DPR,0,0,DPR,0,0);
  ctx.clearRect(0,0,W,H);
  // 純黒背景
  ctx.fillStyle='#000000'; ctx.fillRect(0,0,W,H);

  // 中心グロー（金色の光）
  const cGlow=ctx.createRadialGradient(cx,cy,0,cx,cy,CENTER_W*1.2);
  cGlow.addColorStop(0,'rgba(201,168,76,0.18)');
  cGlow.addColorStop(0.4,'rgba(201,168,76,0.06)');
  cGlow.addColorStop(1,'transparent');
  ctx.fillStyle=cGlow; ctx.fillRect(0,0,W,H);

  // 各ノードから中心への接続線（細い光の線）
  nodes.forEach(n=>{
    if(n.type!=='circle')return;
    const p=CATS[n.cat];
    const dx=cx-n.cx, dy=cy-n.cy, dist=Math.hypot(dx,dy);
    // 線の方向ベクトル
    const ux=dx/dist, uy=dy/dist;
    const startX=n.cx+ux*n.r*0.1, startY=n.cy+uy*n.r*0.1;
    const endX=cx-ux*CENTER_W*0.45, endY=cy-uy*CENTER_H*0.4;
    const grad=ctx.createLinearGradient(startX,startY,endX,endY);
    grad.addColorStop(0,p.stroke+'40');
    grad.addColorStop(0.5,p.stroke+'18');
    grad.addColorStop(1,'rgba(201,168,76,0.5)');
    ctx.save();
    ctx.strokeStyle=grad; ctx.lineWidth=0.8;
    ctx.beginPath(); ctx.moveTo(startX,startY); ctx.lineTo(endX,endY); ctx.stroke();
    // 接続点の光点
    ctx.fillStyle=p.stroke+'cc';
    ctx.beginPath(); ctx.arc(startX,startY,2,0,Math.PI*2); ctx.fill();
    ctx.restore();
  });

  // 中心への接続点（金色）
  const glowPt=ctx.createRadialGradient(cx,cy,0,cx,cy,8);
  glowPt.addColorStop(0,'rgba(201,168,76,0.8)');
  glowPt.addColorStop(1,'transparent');
  ctx.save(); ctx.fillStyle=glowPt; ctx.beginPath(); ctx.arc(cx,cy,8,0,Math.PI*2); ctx.fill(); ctx.restore();

  // ノード描画
  nodes.forEach(n=>{
    if(n===hoveredNode)return;
    n.type==='center'?drawCenter(ctx,n,false):drawCircle(ctx,n,false);
  });
  if(hoveredNode){
    hoveredNode.type==='center'?drawCenter(ctx,hoveredNode,true):drawCircle(ctx,hoveredNode,true);
  }
}

function drawCenter(ctx,n,hov){
  ctx.save();
  // 外側グロー
  const eg=ctx.createRadialGradient(n.cx,n.cy,n.h/2,n.cx,n.cy,n.h*1.8);
  eg.addColorStop(0,'rgba(201,168,76,0.35)');
  eg.addColorStop(0.5,'rgba(201,168,76,0.1)');
  eg.addColorStop(1,'transparent');
  ctx.fillStyle=eg; ctx.beginPath(); ctx.ellipse(n.cx,n.cy,n.w*0.9,n.h*1.7,0,0,Math.PI*2); ctx.fill();

  ctx.shadowColor='rgba(201,168,76,0.8)'; ctx.shadowBlur=hov?30:22;
  ctx.beginPath(); ctx.ellipse(n.cx,n.cy,n.w/2,n.h/2,0,0,Math.PI*2);
  ctx.fillStyle='rgba(12,10,4,0.95)'; ctx.fill();
  ctx.shadowBlur=0;
  ctx.beginPath(); ctx.ellipse(n.cx,n.cy,n.w/2,n.h/2,0,0,Math.PI*2);
  ctx.strokeStyle=hov?'#e8c96a':'rgba(201,168,76,0.9)'; ctx.lineWidth=hov?1.8:1.4; ctx.stroke();
  // 内側二重枠
  ctx.beginPath(); ctx.ellipse(n.cx,n.cy,n.w/2-4,n.h/2-4,0,0,Math.PI*2);
  ctx.strokeStyle='rgba(201,168,76,0.18)'; ctx.lineWidth=0.5; ctx.stroke();

  ctx.textAlign='center'; ctx.textBaseline='middle';
  const fs=Math.max(11,n.w*0.086);
  ctx.font=`300 ${fs}px 'Cormorant Garamond',serif`;
  ctx.fillStyle=hov?'#f0d870':'#c9a84c';
  ctx.shadowColor='rgba(201,168,76,0.6)'; ctx.shadowBlur=6;
  ctx.fillText('HOTEL QADESH',n.cx,n.cy-fs*0.48);
  ctx.shadowBlur=0;
  ctx.font=`400 ${fs*0.58}px 'Noto Serif JP',serif`;
  ctx.fillStyle='rgba(201,168,76,0.5)';
  ctx.fillText('ホテルカデシュ',n.cx,n.cy+fs*0.6);
  ctx.restore();
}

function drawCircle(ctx,n,hov){
  const p=CATS[n.cat]; const pulse=hov;
  ctx.save();
  // 外側グロー（背景）
  const r=n.r;
  const eg=ctx.createRadialGradient(n.cx,n.cy,r*0.5,n.cx,n.cy,r*2.2);
  eg.addColorStop(0,p.stroke+'28');
  eg.addColorStop(0.6,p.stroke+'0a');
  eg.addColorStop(1,'transparent');
  ctx.fillStyle=eg; ctx.beginPath(); ctx.arc(n.cx,n.cy,r*2.2,0,Math.PI*2); ctx.fill();

  // 円の塗り（参考画像のように暗い塗り）
  ctx.beginPath(); ctx.arc(n.cx,n.cy,r,0,Math.PI*2);
  ctx.fillStyle=p.fill; ctx.fill();

  // 枠（グロー付き）
  ctx.shadowColor=p.stroke; ctx.shadowBlur=pulse?28:14;
  ctx.beginPath(); ctx.arc(n.cx,n.cy,r,0,Math.PI*2);
  ctx.strokeStyle=pulse?p.stroke:p.stroke+'aa'; ctx.lineWidth=pulse?1.8:1.2; ctx.stroke();
  ctx.shadowBlur=0;

  // テキスト
  ctx.textAlign='center'; ctx.textBaseline='middle';
  const fsC=Math.max(14,r*0.46), fsL=Math.max(8,r*0.21);
  ctx.font=`300 ${fsC}px 'Cormorant Garamond',serif`;
  ctx.fillStyle=pulse?p.text:p.text+'cc';
  ctx.shadowColor=p.stroke; ctx.shadowBlur=pulse?8:4;
  ctx.fillText(n.count,n.cx,n.cy-fsL*0.65);
  ctx.shadowBlur=0;
  const isJP=/[　-鿿]/.test(p.label);
  ctx.font=`400 ${fsL}px '${isJP?'Noto Serif JP':'Share Tech Mono'}','${isJP?'serif':'monospace'}'`;
  ctx.fillStyle=pulse?p.sub:p.sub.replace('0.7','0.42');
  ctx.fillText(p.label,n.cx,n.cy+fsC*0.5);
  ctx.restore();
}

// ===== くろご詳細 =====
function showKurogoDetail(kId){
  const k=KUROGO[kId], otherKId=kId==='1'?'2':'1', otherK=KUROGO[otherKId];
  modal2Title.textContent=k.name+' — 詳細';
  // kId=1(カデシュ)→上: 「あいつは手足が短い」、下（相手→自分）: 「あいつは頭がデカい」
  // kId=2(フランス)→上: 「あいつは頭がデカい」、下: 「あいつは手足が短い」
  const selfToOther=kId==='1'?'「あいつは手足が短い」':'「あいつは頭がデカい」';
  const otherToSelf=kId==='1'?'「あいつは頭がデカい」':'「あいつは手足が短い」';
  const selfOrg=ORG_BG[k.side], otherOrg=ORG_BG[otherK.side];

  modal2Body.innerHTML=`
    <img class="full-img" src="${FULL_IMG_B64}" alt="くろご キャラクターシート">
    <div class="divider-line"></div>
    <div style="font-family:'Share Tech Mono',monospace;font-size:0.65rem;color:var(--text-dim);letter-spacing:0.1em;text-transform:uppercase;margin-bottom:0.55rem;">— CORRELATION DIAGRAM —</div>
    <div class="corr-canvas-wrap"><canvas class="corr-canvas" id="corrCanvas"></canvas></div>
    <div class="corr-memo">
      <div class="corr-memo-label">— Note —</div>
      <div class="corr-memo-text">そっくりな奴が敵対組織にいる</div>
    </div>`;
  openModal2();

  setTimeout(()=>{
    const cc=document.getElementById('corrCanvas');
    if(!cc)return;
    const dpr=window.devicePixelRatio||1;
    const cw=cc.parentElement.clientWidth;
    // 将来的に人物が増えることを想定した余裕のある高さ
    const ch=Math.max(300,cw*0.42);
    cc.width=cw*dpr; cc.height=ch*dpr;
    cc.style.width=cw+'px'; cc.style.height=ch+'px';
    const c=cc.getContext('2d');
    c.scale(dpr,dpr);
    c.fillStyle='#06060e'; c.fillRect(0,0,cw,ch);

    // 選択したくろごを中心に配置
    const nodeSize=Math.min(88,cw*0.13);
    const bgPad=12;
    // バッジが名前・選択中テキストを覆えるサイズ
    const badgeW=nodeSize+bgPad*2;
    const badgeH=nodeSize+bgPad*2+52; // 名前＋選択中まで含む高さ

    // 中心（選択済み）: cw/2, 相手: cw*0.78
    const selfX=cw*0.28, otherX=cw*0.72;
    const midY=ch*0.44;
    const nodeTop=midY-nodeSize/2;

    // -------- 背景バッジ（選択側）--------
    const bsx=selfX-badgeW/2, bsy=nodeTop-bgPad-26;
    c.save();
    c.fillStyle=selfOrg.bg; c.strokeStyle=selfOrg.border; c.lineWidth=1.5;
    c.beginPath();
    c.roundRect(bsx, bsy, badgeW, badgeH, 7);
    c.fill(); c.stroke();
    // 組織ラベル
    c.font=`400 ${Math.max(9,cw*0.014)}px 'Share Tech Mono',monospace`;
    c.fillStyle=selfOrg.text; c.textAlign='center';
    c.fillText(selfOrg.label, selfX, bsy+14);
    c.restore();

    // -------- 背景バッジ（相手側）--------
    const box=otherX-badgeW/2, boy=nodeTop-bgPad-26;
    c.save();
    c.fillStyle=otherOrg.bg; c.strokeStyle=otherOrg.border; c.lineWidth=1;
    c.beginPath();
    c.roundRect(box, boy, badgeW, badgeH, 7);
    c.fill(); c.stroke();
    c.font=`400 ${Math.max(9,cw*0.014)}px 'Share Tech Mono',monospace`;
    c.fillStyle=otherOrg.text; c.textAlign='center';
    c.fillText(otherOrg.label, otherX, boy+14);
    c.restore();

    // -------- 矢印（上：self→other）--------
    const arrStartX=selfX+nodeSize/2+8, arrEndX=otherX-nodeSize/2-8;
    const arrY1=midY-14;
    c.save();
    c.strokeStyle='rgba(201,168,76,0.72)'; c.lineWidth=1.5;
    c.beginPath(); c.moveTo(arrStartX,arrY1); c.lineTo(arrEndX,arrY1); c.stroke();
    c.fillStyle='rgba(201,168,76,0.72)';
    c.beginPath(); c.moveTo(arrEndX,arrY1); c.lineTo(arrEndX-11,arrY1-5); c.lineTo(arrEndX-11,arrY1+5); c.closePath(); c.fill();
    c.font=`400 ${Math.max(10,cw*0.018)}px 'Noto Serif JP',serif`;
    c.fillStyle='rgba(228,208,148,0.92)'; c.textAlign='center';
    c.fillText(selfToOther, (selfX+otherX)/2, arrY1-10);
    c.restore();

    // -------- 矢印（下：other→self）--------
    const arrY2=midY+14;
    c.save();
    c.strokeStyle='rgba(201,168,76,0.5)'; c.lineWidth=1.5;
    c.beginPath(); c.moveTo(arrEndX,arrY2); c.lineTo(arrStartX,arrY2); c.stroke();
    c.fillStyle='rgba(201,168,76,0.5)';
    c.beginPath(); c.moveTo(arrStartX,arrY2); c.lineTo(arrStartX+11,arrY2-5); c.lineTo(arrStartX+11,arrY2+5); c.closePath(); c.fill();
    c.font=`400 ${Math.max(10,cw*0.018)}px 'Noto Serif JP',serif`;
    c.fillStyle='rgba(210,190,120,0.76)'; c.textAlign='center';
    c.fillText(otherToSelf, (selfX+otherX)/2, arrY2+20);
    c.restore();

    // -------- アイコン描画 --------
    const ICON=new Image();
    ICON.onload=()=>{
      // 自分アイコン（選択中・左）
      c.save();
      c.beginPath(); c.roundRect(selfX-nodeSize/2,nodeTop,nodeSize,nodeSize,5); c.clip();
      c.drawImage(ICON,selfX-nodeSize/2,nodeTop,nodeSize,nodeSize); c.restore();
      c.strokeStyle=selfOrg.border; c.lineWidth=2.5;
      c.shadowColor=selfOrg.border; c.shadowBlur=10;
      c.beginPath(); c.roundRect(selfX-nodeSize/2,nodeTop,nodeSize,nodeSize,5); c.stroke();
      c.shadowBlur=0;
      // 名前
      c.font=`400 ${Math.max(10,cw*0.018)}px 'Noto Serif JP',serif`;
      c.fillStyle='rgba(230,228,240,0.97)'; c.textAlign='center';
      c.fillText(k.name, selfX, nodeTop+nodeSize+16);
      // ▶ 選択中バッジ（大きく・色鮮やか）
      c.font=`600 ${Math.max(11,cw*0.02)}px 'Share Tech Mono',monospace`;
      c.fillStyle=selfOrg.text;
      c.shadowColor=selfOrg.border; c.shadowBlur=8;
      c.fillText('▶ 選択中', selfX, nodeTop+nodeSize+32);
      c.shadowBlur=0;

      // 相手アイコン（右）
      c.save();
      c.globalAlpha=0.72;
      c.beginPath(); c.roundRect(otherX-nodeSize/2,nodeTop,nodeSize,nodeSize,5); c.clip();
      c.drawImage(ICON,otherX-nodeSize/2,nodeTop,nodeSize,nodeSize); c.restore();
      c.strokeStyle=otherOrg.border; c.lineWidth=1.5; c.globalAlpha=0.55;
      c.beginPath(); c.roundRect(otherX-nodeSize/2,nodeTop,nodeSize,nodeSize,5); c.stroke();
      c.globalAlpha=1;
      c.font=`400 ${Math.max(10,cw*0.018)}px 'Noto Serif JP',serif`;
      c.fillStyle='rgba(188,185,200,0.78)'; c.textAlign='center';
      c.fillText(otherK.name, otherX, nodeTop+nodeSize+16);
    };
    ICON.src=KUROGO_ICON_B64;
  },80);
}

// ===== DATA FETCH =====
async function fetchChars(){
  if(charCache)return charCache;
  if(fetchPromise)return fetchPromise;
  fetchPromise=(async()=>{
    try{
      const res=await fetch('https://api.anthropic.com/v1/messages',{
        method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({
          model:'claude-sonnet-4-20250514',max_tokens:6000,
          system:`Return ONLY a JSON array, no markdown.
Format: [{"name":"キャラ名","number":"会員番号or-","affiliations":["tag1"],"pageId":"notionPageId","keyword":"キーワード","nationality":"国籍or-"}]
Notion DB: 7f1bf769-b8ee-4606-bd5b-71ca1ef23d46`,
          messages:[{role:'user',content:'ホテルカデシュのNotionデータベース（collection://7f1bf769-b8ee-4606-bd5b-71ca1ef23d46）から全キャラクターの名前・Number・Affiliation・ページID・キーワード（メタ含む）・Nationality（国籍）をすべてJSON配列で返してください。'}]
        })
      });
      const data=await res.json();
      const raw=data.content.map(b=>b.text||'').join('');
      charCache=JSON.parse(raw.replace(/```json|```/g,'').trim());
      return charCache;
    }catch(e){console.error(e);return null;}
  })();
  return fetchPromise;
}
function charCardHtml(c){
  const hasNum=c.number&&c.number!=='-';
  const numStr=hasNum?`<span class="char-num">No.${c.number}</span>`:'';
  const tagHtml=(c.affiliations||[]).slice(0,4).map(a=>`<span class="char-tag tag-${TAG_TO_CAT[a]||'other'}">${a}</span>`).join('');
  const pid=(c.pageId||'').replace(/-/g,'');
  const oc=pid?`onclick="window.open('https://www.notion.so/${pid}','_blank')"`:'' ;
  return `<div class="char-card" ${oc}><div class="char-left"><div class="char-name">${c.name}</div><div class="char-tags">${tagHtml}</div></div>${numStr}</div>`;
}

  const t=document.getElementById('shokuSubmit');if(!t)return;
  const kH=`<div style="margin-bottom:0.75rem;"><div style="font-family:'Share Tech Mono',monospace;font-size:0.65rem;color:var(--text-dim);letter-spacing:0.12em;text-transform:uppercase;margin-bottom:0.45rem;">— 確認済み：くろご —</div><div class="icon-grid">${kurogoCardHtml('1')}${kurogoCardHtml('2')}</div></div><div class="divider-line"></div>`;
  t.innerHTML=kH+`<div class="modal-loading"><div class="spinner"></div>データを取得中...</div>`;
  const chars=await fetchChars();
  if(!chars){t.innerHTML=kH+`<div class="modal-empty">データの取得に失敗しました</div>`;return;}
  const filtered=chars.filter(c=>(c.affiliations||[]).includes('Killer'));
  t.innerHTML=kH+(filtered.length?`<div class="modal-count-bar">Killer — ${filtered.length} キャラクター</div>`+filtered.map(charCardHtml).join(''):`<div class="modal-empty">他の該当キャラクターなし</div>`);
}
async function showCatModal(catKey){
  const p=CATS[catKey];
  modalDot.style.background=p.stroke;
  modalTitle.textContent=p.label;
  modalSub.textContent=`${p.count} タグ含む`;
  modalBody.innerHTML=`<div class="modal-loading"><div class="spinner"></div>データを取得中...</div>`;
  openModal();
  const chars=await fetchChars();
  if(!chars){modalBody.innerHTML=`<div class="modal-empty">データの取得に失敗しました</div>`;return;}
  const filtered=chars.filter(c=>(c.affiliations||[]).some(a=>p.notionTags.includes(a)));
  if(!filtered.length){modalBody.innerHTML=`<div class="modal-empty">該当するキャラクターが見つかりませんでした</div>`;return;}
  filtered.sort((a,b)=>{const na=parseInt(a.number)||99999,nb=parseInt(b.number)||99999;return na-nb||(a.name||'').localeCompare(b.name||'','ja');});
  modalBody.innerHTML=`<div class="modal-count-bar">${filtered.length} キャラクター</div>`+filtered.map(charCardHtml).join('');
}

// ===== CANVAS INTERACTION =====
function getNode(mx,my){
  for(let i=nodes.length-1;i>=0;i--){
    const n=nodes[i];
    if(n.type==='center'){const dx=(mx-n.cx)/(n.w/2),dy=(my-n.cy)/(n.h/2);if(dx*dx+dy*dy<=1)return n;}
    else{if(Math.hypot(mx-n.cx,my-n.cy)<=n.r)return n;}
  }
  return null;
}
canvas.addEventListener('mousemove',e=>{
  const rect=canvas.getBoundingClientRect();
  const n=getNode(e.clientX-rect.left,e.clientY-rect.top);
  if(n!==hoveredNode){hoveredNode=n;draw();}
  canvas.style.cursor=n?'pointer':'default';
  if(n){
    const lbl=n.type==='center'?'ホテルカデシュ（全一覧）':`${CATS[n.cat].label}（${n.count}件）`;
    tooltip.textContent=lbl; tooltip.classList.add('show');
    let tx=e.clientX+12,ty=e.clientY+9;
    if(tx+200>window.innerWidth)tx=e.clientX-210;
    if(ty+32>window.innerHeight)ty=e.clientY-28;
    tooltip.style.left=tx+'px'; tooltip.style.top=ty+'px';
  }else tooltip.classList.remove('show');
});
canvas.addEventListener('mouseleave',()=>{hoveredNode=null;tooltip.classList.remove('show');draw();});
canvas.addEventListener('click',e=>{
  const rect=canvas.getBoundingClientRect();
  const n=getNode(e.clientX-rect.left,e.clientY-rect.top);
  if(!n)return;
  if(n.type==='center'){showQadeshModal();}
  else if(n.cat==='敵対'){showTekirModal();openModal();}
  else if(n.cat==='職種'){showShokuModal();openModal();}
  else{showCatModal(n.cat);}
});
window.addEventListener('resize',()=>{if(document.getElementById('mainScreen').classList.contains('active'))resize();});
</script>
